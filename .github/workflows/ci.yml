name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check tracked environment files
        run: pwsh -File backend/scripts/check-no-tracked-secrets.ps1

      - name: Check formatting
        working-directory: backend
        shell: bash
        run: |
          files="$(find . -path './.gocache' -prune -o -name '*.go' -print)"
          test -z "$(gofmt -l $files)"

      - name: Build
        working-directory: backend
        run: go build ./...

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Run tests
        working-directory: backend
        run: go test -count=1 ./...

      - name: Run race tests
        working-directory: backend
        run: go test -race ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Vulnerability check
        working-directory: backend
        run: govulncheck ./...

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend e2e tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/safebase-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push API image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Google Chat
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ -z "$GOOGLE_CHAT_WEBHOOK_URL" ]; then
            echo "GOOGLE_CHAT_WEBHOOK_URL is not configured; notification skipped."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            icon="✅"
            error_message="Aucune erreur."
          else
            icon="❌"
            error_message="La pipeline a échoué. Consultez les logs GitHub Actions : $RUN_URL"
          fi

          payload=$(jq -n \
            --arg text "$icon Pipeline CI SafeBase : $JOB_STATUS\nDépôt : $REPOSITORY\nCommit : ${COMMIT_SHA:0:7} - $COMMIT_MESSAGE\nAuteur : $COMMIT_AUTHOR\n$error_message\n$RUN_URL" \
            '{text: $text}')
          curl --fail-with-body --retry 2 \
            -H 'Content-Type: application/json; charset=UTF-8' \
            -d "$payload" \
            "$GOOGLE_CHAT_WEBHOOK_URL"
